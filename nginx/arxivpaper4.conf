# ============================================================
# AI4Papers Nginx 配置（SEO 优化版）
# 部署：cp /projects/ArxivPaper4/nginx/arxivpaper4.conf /etc/nginx/conf.d/arxivpaper4.conf
#       nginx -t && systemctl reload nginx
# ============================================================

# ---------- 通用代理头（减少重复） ----------
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ① IP 直接访问兜底（不做 SEO，仅保持可用）
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 8.137.23.146 _;

    root /projects/ArxivPaper4/View/dist;
    index index.html;

    access_log /var/log/nginx/arxiv_access.log;
    error_log  /var/log/nginx/arxiv_error.log;

    location /m/assets/ {
        alias /projects/ArxivPaper4/Mobile/dist/assets/;
    }
    location /m/ {
        alias /projects/ArxivPaper4/Mobile/dist/;
        try_files $uri $uri/ /m/index.html;
    }
    location = /m/index.html {
        alias /projects/ArxivPaper4/Mobile/dist/index.html;
    }
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /api/docs {
        proxy_pass http://127.0.0.1:8000/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /api/openapi.json {
        proxy_pass http://127.0.0.1:8000/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /api/redoc {
        proxy_pass http://127.0.0.1:8000/redoc;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 60m;
    }
    location ^~ /static/ {
        proxy_pass http://127.0.0.1:8000/static/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}


# ② HTTP → HTTPS 强制跳转（含 www 统一到裸域名）
server {
    listen 80;
    listen [::]:80;
    server_name ai4papers.com www.ai4papers.com;
    return 301 https://ai4papers.com$request_uri;
}


# ③ www.ai4papers.com HTTPS → 裸域名 301（SEO 统一权重）
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.ai4papers.com;

    ssl_certificate     /etc/nginx/ssl/www.ai4papers.com.pem;
    ssl_certificate_key /etc/nginx/ssl/www.ai4papers.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    return 301 https://ai4papers.com$request_uri;
}


# ④ 主站 HTTPS（ai4papers.com）—— SEO 优化版
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ai4papers.com;

    ssl_certificate     /etc/nginx/ssl/www.ai4papers.com.pem;
    ssl_certificate_key /etc/nginx/ssl/www.ai4papers.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    root /projects/ArxivPaper4/View/dist;
    index index.html;

    access_log /var/log/nginx/arxiv_access.log;
    error_log  /var/log/nginx/arxiv_error.log;

    # ---------- 性能：gzip 压缩 ----------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    # ---------- 安全头 ----------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ========== SEO 关键路由：代理到后端动态生成 ==========
    # 这些必须放在 location / 之前，否则会被 try_files 拦截

    location = /sitemap.xml {
        proxy_pass http://127.0.0.1:8000/sitemap.xml;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 搜索引擎每天来抓一次就够
        add_header Cache-Control "public, max-age=3600";
    }

    location = /llms.txt {
        proxy_pass http://127.0.0.1:8000/llms.txt;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=3600";
    }

    location = /llms-full.txt {
        proxy_pass http://127.0.0.1:8000/llms-full.txt;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=3600";
    }

    location = /.well-known/ai-plugin.json {
        proxy_pass http://127.0.0.1:8000/.well-known/ai-plugin.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=86400";
    }

    location = /robots.txt {
        # 让 Nginx 直接返回 dist 里的 robots.txt，不走 SPA fallback
        try_files /robots.txt =404;
        add_header Cache-Control "public, max-age=86400";
    }

    # ========== 移动端 ==========
    location /m/assets/ {
        alias /projects/ArxivPaper4/Mobile/dist/assets/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    location /m/ {
        alias /projects/ArxivPaper4/Mobile/dist/;
        try_files $uri $uri/ /m/index.html;
    }
    location = /m/index.html {
        alias /projects/ArxivPaper4/Mobile/dist/index.html;
        add_header Cache-Control "no-cache";
    }

    # ========== 前端静态资源（带 hash 的 JS/CSS）长缓存 ==========
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ========== 前端 SPA 兜底（放在 SEO 路由之后） ==========
    location / {
        try_files $uri $uri/ /index.html;
        # index.html 不缓存，确保每次部署后立即生效
        location = /index.html {
            add_header Cache-Control "no-cache";
        }
    }

    # ========== FastAPI 文档映射 ==========
    location = /api/docs {
        proxy_pass http://127.0.0.1:8000/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /api/openapi.json {
        proxy_pass http://127.0.0.1:8000/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /api/redoc {
        proxy_pass http://127.0.0.1:8000/redoc;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ========== API 代理 ==========
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        client_max_body_size 60m;

        # SSE / streaming 需要关闭缓冲
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # ========== 后端静态资源 ==========
    location ^~ /static/ {
        proxy_pass http://127.0.0.1:8000/static/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
