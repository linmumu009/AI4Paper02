    <!-- 移动设备自动跳转移动端 -->
    <script>
      ;(function(){
        var ua = navigator.userAgent || ''
        var isTablet = /iPad|Tablet|PlayBook|Silk/i.test(ua) || (/Android/i.test(ua) && !/Mobile/i.test(ua))
        var isPhone = !isTablet && /Android|iPhone|iPod|Mobile|webOS|Windows Phone/i.test(ua)
        if (isPhone) {
          var loc = window.location;
          if (loc.port === '5173') {
            // 开发模式：跳到移动端 dev server 端口
            loc.replace(loc.protocol + '//' + loc.hostname + ':5174' + loc.pathname + loc.search + loc.hash);
          } else if (!loc.pathname.startsWith('/m/') && !loc.pathname.startsWith('/api/')) {
            // 生产模式：跳到 /m/ 路径
            loc.replace('/m' + loc.pathname + loc.search + loc.hash);
          }
        }
      })()
    </script>

    <script>

        document.documentElement.setAttribute('data-theme', t)
