<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fd267a"/>
      <stop offset="100%" stop-color="#ff6036"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#fd267a" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Big Rounded Rectangle (Squircle-like) -->
  <rect width="512" height="512" rx="116" fill="url(#bg-grad)"/>

  <g filter="url(#shadow)">
    <!-- Solid white paper with a folded corner -->
    <path d="M150 110 h150 l90 90 v200 a20 20 0 0 1 -20 20 h-220 a20 20 0 0 1 -20 -20 v-270 a20 20 0 0 1 20 -20 z" fill="#ffffff" />
    
    <!-- Fold overlay to give it some depth -->
    <path d="M300 110 v70 a20 20 0 0 0 20 20 h70 z" fill="#f0f0f0" />

    <!-- AI Sparkle / Star (Negative space or colored star) -->
    <!-- We use a pinkish-orange gradient for the star to make it pop out of the white paper -->
    <path d="M260 210 c 0 25, 20 45, 45 45 c -25 0, -45 20, -45 45 c 0 -25, -20 -45, -45 -45 c 25 0, 45 -20, 45 -45 z" fill="url(#bg-grad)" />
    
    <!-- Lines for text on the paper -->
    <rect x="190" y="320" width="140" height="16" rx="8" fill="#e0e0e0" />
    <rect x="190" y="360" width="100" height="16" rx="8" fill="#e0e0e0" />
  </g>
</svg>
